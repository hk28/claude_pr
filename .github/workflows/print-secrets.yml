name: Print Secrets (Debug Version)

on:
  workflow_dispatch:  # Nur manuell auslösen!

jobs:
  debug-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: ⚠️ Debug - Secrets ausgeben (NUR FÜR TESTS!)
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
          API_KEY: ${{ secrets.DEPLOY_HOST }}
          DATABASE_URL: ${{ secrets.DEPLOY_USER }}
          GITHUB_TOKEN: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "=== ⚠️ WARNING: SECRETS WERDEN AUSGEGEBEN! ⚠️ ==="
          echo ""
          echo "MY_SECRET=$MY_SECRET"
          echo "API_KEY=$API_KEY"
          echo "DATABASE_URL=$DATABASE_URL"
          echo "GITHUB_TOKEN=$GITHUB_TOKEN"
          echo ""
          echo "=== Alle Environment Secrets ==="
          env | grep -i secret || echo "Keine Secrets mit 'secret' im Namen gefunden"
          echo ""
          echo "=== Alle Variablen mit _ prefix ==="
          env | sort
