name: Test Secrets Configuration

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Test DEPLOY_HOST
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "❌ DEPLOY_HOST ist LEER oder nicht gesetzt!"
            echo "Überprüfe: Settings → Secrets and variables → Actions"
            exit 1
          else
            echo "✅ DEPLOY_HOST ist korrekt gesetzt!"
            echo "Länge: ${#DEPLOY_HOST} Zeichen"
          fi
      
      - name: Test DEPLOY_USER
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if [ -z "$DEPLOY_USER" ]; then
            echo "❌ DEPLOY_USER ist LEER oder nicht gesetzt!"
            exit 1
          else
            echo "✅ DEPLOY_USER ist korrekt gesetzt!"
            echo "Länge: ${#DEPLOY_USER} Zeichen"
          fi
      
      - name: Test DEPLOY_SSH_KEY
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "❌ DEPLOY_SSH_KEY ist LEER oder nicht gesetzt!"
            exit 1
          else
            echo "✅ DEPLOY_SSH_KEY ist korrekt gesetzt!"
            echo "Länge: ${#DEPLOY_SSH_KEY} Zeichen"
          fi
      
      - name: Summary
        run: |
          echo ""
          echo "=== Zusammenfassung ==="
          echo "Wenn alle Tests grün sind (✅), sind deine Secrets korrekt konfiguriert."
          echo ""
          echo "Hinweis: GitHub maskiert die Secrets in Logs mit *** - das ist normal!"
          echo "Das bedeutet nicht, dass sie leer sind."
