{{define "topbar"}}
<header class="topbar">
  <div class="topbar-filters">
    <form class="topbar-form"
          hx-get="/"
          hx-target="#main-content"
          hx-push-url="true"
          hx-trigger="change">
      <select name="series" class="select-input">
        <option value="">All series</option>
        {{range .Series}}
        <option value="{{.Config.SlugName}}"{{if eq $.FilterSlug .Config.SlugName}} selected{{end}}>
          {{.Config.Name}}
        </option>
        {{end}}
      </select>
      <select name="type" class="select-input">
        <option value="">All types</option>
        <option value="audio"{{if eq .FilterType "audio"}} selected{{end}}>Audio</option>
        <option value="ebook"{{if eq .FilterType "ebook"}} selected{{end}}>E-Book</option>
      </select>
      <label class="checkbox-label">
        <input type="checkbox" name="missing" value="1"{{if .OnlyMissing}} checked{{end}}>
        Pending only
      </label>
    </form>
  </div>
  <div class="topbar-views">
    <a class="view-btn{{if eq .ViewMode "big"}} active{{end}}"
       hx-get="/?view=big&series={{.FilterSlug}}&type={{.FilterType}}"
       hx-target="#main-content"
       hx-push-url="true">Big</a>
    <a class="view-btn{{if eq .ViewMode "medium"}} active{{end}}"
       hx-get="/?view=medium&series={{.FilterSlug}}&type={{.FilterType}}"
       hx-target="#main-content"
       hx-push-url="true">Medium</a>
    <a class="view-btn{{if eq .ViewMode "details"}} active{{end}}"
       hx-get="/?view=details&series={{.FilterSlug}}&type={{.FilterType}}"
       hx-target="#main-content"
       hx-push-url="true">Details</a>
  </div>
</header>
{{end}}
